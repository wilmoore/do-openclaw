- name: Create OpenClaw directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/openclaw
    - /workspace
    - /var/log/openclaw

- name: Ensure Docker network
  docker_network:
    name: openclaw_net
    driver: bridge
    state: present

- name: Pull OpenClaw image
  docker_image:
    name: "{{ openclaw_image }}"
    source: pull
    force_source: yes

- name: Create OpenClaw container
  docker_container:
    name: openclaw
    image: "{{ openclaw_image }}"
    networks_cli_compatible: yes
    networks:
      - name: openclaw_net
    read_only: yes
    tmpfs:
      - /workspace:size={{ workspace_size }},rw
    memory: "{{ container_memory }}"
    cpus: "{{ container_cpus }}"
    env:
      ALLOWLIST: "{{ allowlist }}"
    restart_policy: unless-stopped
    state: started